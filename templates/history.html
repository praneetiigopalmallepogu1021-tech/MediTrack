<!DOCTYPE html>
<html>
<head>
    <title>Maintenance History</title>
</head>
<body>

<h1>Maintenance History - Equipment {{ eid }}</h1>

<a href="/">← Back to Dashboard</a>

<br><br>

<table border="1">
    <tr>
        <th>Date</th>
        <th>Technician</th>
        <th>Issue</th>
        <th>Resolution</th>
        <th>Next Due</th>
    </tr>

    {% for log in logs %}
    <tr>
        <td>{{ log.maintenance_date }}</td>
        <td>{{ log.technician_name }}</td>
        <td>{{ log.issue_reported }}</td>
        <td>{{ log.resolution_notes }}</td>
        <td>{{ log.next_due_date }}</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
